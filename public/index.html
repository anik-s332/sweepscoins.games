        <script>
            function closeModal() {
              const TokenNiztion = document.getElementById("iframPayment");
              const iframPaymentBack = document.getElementById("iframPaymentBack");
              TokenNiztion.style.display = "none";
              iframPaymentBack.style.display = "none";
    
                // iframe loader js
              var iframeIds = document.querySelector("iframe")?.id;
              var iframe = document.getElementById(iframeIds);
              iframe.src = iframe.src; // Reloads the iframe by resetting its src attribute
            };
    
            // Call the API function when the document is ready
            $(document).ready(function() {
                window.myGlobalFunction = function(state = "") {
                    callAPI(state); 
                };
                window.CallGooglePayment = function() {
                  CallGooglePayment(); 
                };
            });
    
            function callAPI(state) {
              document.getElementById("pageisLoading").style.display = "flex";
              fetch('https://api.ipify.org/?format=json')
                .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                    return response.json();
                })
                .then((data) => {
                    // console.log("data", data)
                    localStorage.setItem("IP", data?.ip);
                    OCTAutorize(data?.ip, state);
                })
                .catch((error) => {
                    // Handle errors
                    document.getElementById("pageisLoading").style.display = "none";
                });
            };
    
            // get autorize api
            function OCTAutorize(ip, state) {
                // Headers to be included in the request
                var requestHeaders = {
                  'Content-Type': 'application/json', // Example header
                  'Authorization': `Bearer ${localStorage.getItem("access_tokens")}` // Example header for authorization
                };
    
                // Making a POST request with headers
                $.ajax({
                    url: `${localStorage.getItem("NEXT_PUBLIC_BASE_URL")}user/oct-auth/${ip}`,
                    type: 'GET',
                    headers: requestHeaders,
                    dataType: 'json',
                    // data: JSON.stringify(requestData), // Convert data to JSON string
                    success: function(responseData) {
                      // Handle the response from the API
                      console.log('Response from the API:', responseData?.data);
    
                      const currentDate = new Date();
                      const hours = currentDate.getUTCHours();
                      const minutes = currentDate.getUTCMinutes();
                      const seconds = currentDate.getUTCSeconds();
                      const milliseconds = currentDate.getUTCMilliseconds();
                      const timezoneOffset = currentDate.getTimezoneOffset();
                      console.log(`Oct-Auth API Time: ${hours}:${minutes}:${seconds}.${milliseconds}${timezoneOffset}`);
                      if(state === "google_pay"){
                        CallGooglePayment(responseData?.data, state)
                      }else{
                        ImplementingSecond(responseData?.data, state)
                      }
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                      // Handle errors
                      // console.error('Error:', errorThrown);
                      document.getElementById("pageisLoading").style.display = "none";
                      closeModal();
                    }
                });
            };
    
            function ImplementingSecond(data) {
                console.log('Received data:', data);
                setTimeout(()=>{
                  document.getElementById("pageisLoading").style.display = "none";
                }, [15000])
                var i4goTrueTokenObj = $("#form-main").i4goTrueToken({
                    debug: false, // Parent side
                    remoteDebug: false, // Adds width indicators within the iframe contents to help with frame sizing,
                    url: data?.i4go_i4m_url,
                    server: data?.i4go_server,
                    accessBlock: data?.i4go_accessblock,
                    self: document.location,
                    template: "bootstrap2",
                    language: "en",
                    i4go_extendedcarddata: false,
                    onSuccess: function(form,data) {
                        console.log("MY onSuccess called!",form,data);
                        const currentDate = new Date();
                        const hours = currentDate.getUTCHours();
                        const minutes = currentDate.getUTCMinutes();
                        const seconds = currentDate.getUTCSeconds();
                        const milliseconds = currentDate.getUTCMilliseconds();
                        const timezoneOffset = currentDate.getTimezoneOffset();
                        console.log(`I4goTrueToken API Time: ${hours}:${minutes}:${seconds}.${milliseconds}${timezoneOffset}`);
    
                        SaveTokenAPI(data?.i4go_uniqueid, data);
                    },
                    onFailure: function(form,data) {
                        console.warn("MY onFailure called!",form,data);
                        // console.warn("MY onFailure called!",form,data);
                    }
                });
                console.log("i4goTrueTokenObj", i4goTrueTokenObj)
                // iframe loader js
                var iframeIds = document.querySelector("iframe")?.id;
                var iframes = document.getElementById(iframeIds);
                console.log("iframeIds", iframeIds, iframes)
                iframes.onload = function() {
                    document.getElementById("pageisLoading").style.display = "none";
                  console.log("iframeIds1", iframeIds, iframes)
                };
    
                $.cardswipe({
                    success: function (data) {
                      console.log("data", data)
                        i4goTrueTokenObj.sendSwipeToFrame(data);
                    },
                    error: function() {
                        console.warn("Swipe failed!");
                    }
                });
            };
    
            // save token api
            function SaveTokenAPI(token, cardData) {
                // Headers to be included in the request
                var requestHeaders = {
                  'Content-Type': 'application/json', // Example header
                  'Authorization': `Bearer ${localStorage.getItem("access_tokens")}` // Example header for authorization
                };
                const check_data = localStorage.getItem("order_place");
                if(check_data){
                  document.getElementById("pageisLoading").style.display = "flex";
                    const IP = localStorage.getItem("IP");
                    const options = Intl.DateTimeFormat().resolvedOptions();
                    const timezoneName = options.timeZone;
                  const dataJson = JSON.parse(check_data);
                  console.log("dataJson", dataJson)
                  const requestData ={
                    token:token,
                    order_id: dataJson?.id,
                    amount: dataJson?.total_amount,
                    ipaddress: IP,
                    timezone: timezoneName,
                    payment_type: 'shift-card',
                    // card_number: cardData?.i4go_maskedcard,
                    // ccexp: `${cardData?.i4go_expirationmonth}/${cardData?.i4go_expirationyear}`,
                    // cvv:"",
                    // cardholder_name:`${dataJson?.first_name} ${dataJson?.last_name}`
                  }
                  // Making a POST request with headers
                  $.ajax({
                      url: `${localStorage.getItem("NEXT_PUBLIC_BASE_URL")}user/payment`,
                      type: 'POST',
                      headers: requestHeaders,
                      dataType: 'json',
                      data: JSON.stringify(requestData), // Convert data to JSON string
                      success: function(responseData) {
                        closeModal();
      
                        // document.getElementById("TokenizingCrdbtn").innerText = "Update Payment Card";
                        if(window.postMessage){
                          window.postMessage({data:responseData, type:"response", STATUS:200});
                        }
                    document.getElementById("pageisLoading").style.display = "none";
                        // localStorage.setItem("SAVE_CARD", responseData?.msg);
                      },
                      error: function(jqXHR, textStatus, errorThrown) {
                        // closeModal();
                        if(window.SaveTokenAPI){
                          console.log("jqXHR, textStatus, errorThrown", jqXHR, textStatus, errorThrown)
                          window.postMessage({data:jqXHR?.responseJSON, type:"response", STATUS:400});
                        }
                    document.getElementById("pageisLoading").style.display = "none";
                        // localStorage.setItem("SAVE_CARD", responseData?.msg);
                        // localStorage.setItem("SAVE_CARD", "FALSE");
                      }
                  });
                }
          };
          const CallGooglePayment = (data)=>{
            console.log('Received data:', data);
              setTimeout(()=>{
                document.getElementById("pageisLoading").style.display = "none";
              }, [15000])
            var i4goTrueTokenObj = $("#form-main-google").i4goTrueToken({
              debug:						true,		// Parent side
              remoteDebug:				true,		// Adds width indicators within the iframe contents to help with frame sizing
              url: data?.i4go_i4m_url,
              server: data?.i4go_server,
              accessBlock: data?.i4go_accessblock,
              self:						document.location,
              template:					"shift4shop",
              language:					"en",
              encryptedOnlySwipe:			false,
              onSuccess: function(form,data) {
                console.log("MY onSuccess called!",form,data);
              },
              onFailure: function(form,data) {
                console.warn("MY onFailure called!",form,data);
              },
              onWalletInit: function(wallet, enabled, reason ) {
                console.log("i4goTrueToken- onWalletInit()",wallet, enabled, reason);
              },
            });
            console.log("i4goTrueTokenObj", i4goTrueTokenObj)

            $.cardswipe({
              success: function (data) {
                i4goTrueTokenObj.sendSwipeToFrame(data);
                // i4goTrueTokenObj.sendGooglePayToFrame(data);
              },
              error: function() {
                console.warn("Swipe failed!");
              }
            });

            $("#outside-submit").click(function(e){
              e.preventDefault();
              i4goTrueTokenObj.submit();
            })
          }
        </script>
